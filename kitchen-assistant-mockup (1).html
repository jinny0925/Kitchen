<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>우리집 부엌 — 디자인 시안</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root {
    --bg: #ffffff;
    --surface: #fafafa;
    --line: #ececec;
    --line-strong: #e0e0e0;
    --ink: #1c1c1e;
    --ink-mid: #6b6b70;
    --ink-soft: #a0a0a5;
    --accent: #e0904c;       /* 따뜻한 오렌지 - 부엌 느낌 */
    --accent-bg: #fbf0e4;
    --fresh: #5b9a6b;        /* 신선 - 그린 */
    --fresh-bg: #ebf3ec;
    --soon: #d9a23b;         /* 임박 - 옐로우 */
    --soon-bg: #fbf3df;
    --expired: #d9655f;      /* 만료 - 레드 */
    --expired-bg: #fbecec;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #e8e8ea;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    position: relative;
  }

  .demo-banner {
    background: #fff8e1;
    border-bottom: 1px solid #f0e2b0;
    padding: 8px 22px;
    font-size: 12px;
    color: #8a7320;
    text-align: center;
    font-weight: 500;
  }

  header { padding: 22px 22px 0; }
  .head-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
  .head-sub { font-size: 13px; color: var(--ink-soft); margin-top: 3px; font-weight: 500; }

  .tabs { display: flex; padding: 18px 22px 0; border-bottom: 1px solid var(--line); }
  .tab {
    padding: 8px 2px 14px; margin-right: 20px;
    background: none; border: none; font-family: inherit;
    font-size: 15px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; position: relative; letter-spacing: -0.02em;
  }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: ""; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--ink); border-radius: 2px;
  }

  .content { padding: 20px 22px 100px; }

  /* ===== 냉장고 ===== */
  .summary-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .summary-card {
    flex: 1; padding: 13px 12px; border-radius: 13px; text-align: center;
  }
  .summary-num { font-size: 21px; font-weight: 700; letter-spacing: -0.03em; }
  .summary-label { font-size: 11px; font-weight: 600; margin-top: 2px; }
  .sc-fresh { background: var(--fresh-bg); }
  .sc-fresh .summary-num, .sc-fresh .summary-label { color: var(--fresh); }
  .sc-soon { background: var(--soon-bg); }
  .sc-soon .summary-num, .sc-soon .summary-label { color: var(--soon); }
  .sc-expired { background: var(--expired-bg); }
  .sc-expired .summary-num, .sc-expired .summary-label { color: var(--expired); }

  .group-label {
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
    margin: 18px 0 8px; letter-spacing: 0.02em;
  }

  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 0; border-bottom: 1px solid var(--line);
  }
  .item-emoji {
    width: 40px; height: 40px; border-radius: 11px;
    background: var(--surface); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .item-body { flex: 1; }
  .item-name { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .item-place { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .item-dday {
    font-size: 12px; font-weight: 700;
    padding: 5px 10px; border-radius: 9px; flex-shrink: 0;
  }
  .dday-fresh { background: var(--fresh-bg); color: var(--fresh); }
  .dday-soon { background: var(--soon-bg); color: var(--soon); }
  .dday-expired { background: var(--expired-bg); color: var(--expired); }

  /* ===== 레시피 ===== */
  .recipe-search {
    width: 100%; border: 1px solid var(--line-strong);
    border-radius: 12px; padding: 11px 14px;
    font-family: inherit; font-size: 14px; margin-bottom: 16px;
    background: var(--surface);
  }

  .recipe-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .recipe-card {
    border: 1px solid var(--line); border-radius: 14px;
    overflow: hidden; cursor: pointer;
  }
  .recipe-thumb {
    aspect-ratio: 1 / 0.72;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; position: relative;
  }
  .recipe-src {
    position: absolute; top: 7px; left: 7px;
    font-size: 9px; font-weight: 700; color: #fff;
    padding: 3px 7px; border-radius: 6px;
    background: rgba(0,0,0,0.55);
  }
  .recipe-body { padding: 10px 11px 12px; }
  .recipe-name {
    font-size: 13px; font-weight: 600; line-height: 1.35;
    letter-spacing: -0.02em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .recipe-memo {
    font-size: 11px; color: var(--ink-soft); margin-top: 4px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ===== 장보기 (날짜별 묶음) ===== */
  .trip-card {
    border: 1px solid var(--line-strong);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .trip-card.active-trip { border-color: var(--accent); background: #fffdfa; }

  .trip-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .trip-date { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .trip-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
  .trip-badge.todo { background: var(--accent-bg); color: var(--accent); }
  .trip-badge.done { background: var(--fresh-bg); color: var(--fresh); }

  .trip-progress { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }

  .shop-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 0; border-bottom: 1px solid var(--line);
  }
  .shop-item:last-of-type { border-bottom: none; }
  .shop-check {
    width: 21px; height: 21px; border-radius: 7px;
    border: 1.5px solid var(--line-strong); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px;
  }
  .shop-item.done .shop-check { background: var(--accent); border-color: var(--accent); }
  .shop-name { flex: 1; font-size: 14px; font-weight: 500; }
  .shop-item.done .shop-name { color: var(--ink-soft); text-decoration: line-through; }
  .shop-from {
    font-size: 10px; color: var(--accent);
    background: var(--accent-bg); padding: 3px 8px; border-radius: 8px;
  }

  .trip-finish {
    width: 100%; margin-top: 14px;
    padding: 12px; border-radius: 11px;
    border: none; background: var(--accent); color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .trip-add-item {
    width: 100%; margin-top: 10px;
    padding: 10px; border-radius: 10px;
    border: 1px dashed var(--line-strong);
    background: var(--bg); color: var(--ink-soft);
    font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .trip-card.past { opacity: 0.72; }
  .trip-card.past .trip-date { font-size: 14px; }



  /* ===== 부엌 비서 추가 기능 ===== */
  .assistant-card {
    border-radius: 17px;
    padding: 16px;
    margin-bottom: 18px;
    background: linear-gradient(135deg, #fff8ef 0%, #fffdf9 100%);
    border: 1px solid #f2dfc9;
  }
  .assistant-title { font-size: 15px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 5px; }
  .assistant-desc { font-size: 12px; color: var(--ink-mid); line-height: 1.45; margin-bottom: 13px; }
  .priority-list { display: flex; flex-direction: column; gap: 8px; }
  .priority-item {
    display: flex; align-items: center; gap: 9px;
    padding: 10px; background: rgba(255,255,255,0.72);
    border: 1px solid #f3e7da; border-radius: 12px;
  }
  .priority-emoji { font-size: 20px; width: 28px; text-align: center; }
  .priority-body { flex: 1; min-width: 0; }
  .priority-name { font-size: 13px; font-weight: 700; letter-spacing: -0.02em; }
  .priority-reason { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .priority-tag { font-size: 11px; font-weight: 800; padding: 5px 8px; border-radius: 8px; }

  .rule-card {
    margin-bottom: 18px; padding: 14px;
    border-radius: 15px; background: var(--surface);
    border: 1px solid var(--line);
  }
  .rule-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .rule-title { font-size: 13px; font-weight: 800; letter-spacing: -0.02em; }
  .rule-edit { font-size: 11px; color: var(--accent); font-weight: 800; }
  .rule-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .rule-chip { padding: 10px 6px; border-radius: 11px; text-align: center; background: #fff; border: 1px solid var(--line); }
  .rule-chip strong { display: block; font-size: 12px; margin-bottom: 2px; }
  .rule-chip span { font-size: 10px; color: var(--ink-soft); font-weight: 600; }

  .item-meta { display: flex; align-items: center; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
  .type-badge { font-size: 10px; font-weight: 800; padding: 3px 7px; border-radius: 7px; }
  .type-fresh { color: var(--fresh); background: var(--fresh-bg); }
  .type-normal { color: var(--accent); background: var(--accent-bg); }
  .type-frozen { color: #5579b8; background: #edf2fb; }
  .place-text { font-size: 12px; color: var(--ink-soft); }

  .recipe-suggest {
    border: 1px solid var(--line); border-radius: 15px;
    padding: 14px; margin: 16px 0 18px;
  }
  .recipe-suggest-title { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
  .recipe-suggest-desc { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }
  .mini-recipe {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-top: 1px solid var(--line);
  }
  .mini-recipe:first-of-type { border-top: none; }
  .mini-recipe-emoji { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--surface); font-size: 18px; }
  .mini-recipe-body { flex: 1; }
  .mini-recipe-name { font-size: 13px; font-weight: 700; }
  .mini-recipe-uses { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .mini-recipe-btn { border: none; background: var(--ink); color: #fff; border-radius: 9px; padding: 7px 9px; font-family: inherit; font-size: 11px; font-weight: 800; }

  .quick-actions { display: flex; gap: 8px; margin: 10px 0 2px; }
  .quick-btn {
    flex: 1; border: 1px solid var(--line-strong); background: #fff;
    border-radius: 10px; padding: 9px 8px;
    font-family: inherit; font-size: 12px; font-weight: 800; color: var(--ink-mid);
  }
  .quick-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

  .setting-view .setting-section { margin-bottom: 22px; }
  .setting-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; }
  .setting-card { padding: 14px; border: 1px solid var(--line); border-radius: 15px; background: var(--surface); margin-bottom: 10px; }
  .setting-card-head { display: flex; justify-content: space-between; align-items: center; }
  .setting-card-name { font-size: 14px; font-weight: 800; }
  .setting-card-value { font-size: 12px; font-weight: 800; color: var(--accent); }
  .setting-card-desc { font-size: 12px; color: var(--ink-soft); margin-top: 5px; line-height: 1.45; }

  .fab {
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(calc(-50% + 158px));
    width: 52px; height: 52px; border-radius: 16px;
    background: var(--ink); color: #fff; border: none;
    font-size: 24px; cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
  }
  @media (max-width: 480px) { .fab { transform: none; right: 22px; } }
</style>
</head>
